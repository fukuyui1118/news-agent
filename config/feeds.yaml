# Phase 8: NewsAPI.ai layer dropped entirely. Claude Opus 4.7 + web_search
# replaces it as the curated research layer, fired twice daily via cadence
# enforcement. The hourly fetch_cycle still invokes the source, but it
# self-skips if the last successful call was within `cadence_hours`.

claude_research:
  monthly_token_cap: 2_000_000   # ~$60 ceiling at Opus 4.7 rates (advisory)
  queries:
    - name: insurance sector research (JP-focused)
      model: claude-opus-4-7
      cadence_hours: 12          # ~twice per day; no separate scheduler job
      tier: 1                    # tier-1 sources bypass the relevance gate
      max_headlines: 30
      max_search_uses: 12
