# Thematic keyword buckets used to GENERATE Google News queries.
# Each (entity in watchlists.yaml) × (bucket here) → one Google News query per fetch cycle.
# Keywords inside a bucket are OR-joined inside Google's query syntax. Mix JP and EN freely.

