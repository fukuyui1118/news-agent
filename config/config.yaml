sources:
  # ---- English RSS (existing global tier) ----
  - name: Insurance Journal International
    type: rss
    url: https://www.insurancejournal.com/news/international/feed/
    tier: 3
    enabled: true
  - name: Reinsurance News
    type: rss
    url: https://www.reinsurancene.ws/feed/
    tier: 2
    enabled: true
  - name: Artemis
    type: rss
    url: https://www.artemis.bm/feed/
    tier: 2
    enabled: true

  # ---- Japanese Google News searches (Phase 3b+) ----
  # Bilingual queries (JP + EN) with shared business-focus suffix to bias toward
  # capital-market, M&A, and strategic business news. Edit queries freely.
  # Suffix: (決算 OR 業績 OR M&A OR 買収 OR 合併 OR 提携 OR IPO OR 増資 OR 配当 OR 経営 OR 規制 OR 行政処分 OR 中期経営計画 OR earnings OR acquisition OR merger OR capital)

  - name: Google News - 東京海上
    type: google_news_rss
    query: (東京海上 OR "Tokio Marine") (決算 OR 業績 OR M&A OR 買収 OR 合併 OR 提携 OR IPO OR 増資 OR 配当 OR 経営 OR 規制 OR 行政処分 OR 中期経営計画 OR earnings OR acquisition OR merger OR capital)
    tier: 2
    enabled: true
  - name: Google News - 損保ジャパン
    type: google_news_rss
    query: (損保ジャパン OR SOMPO OR "Sompo Holdings") (決算 OR 業績 OR M&A OR 買収 OR 合併 OR 提携 OR IPO OR 増資 OR 配当 OR 経営 OR 規制 OR 行政処分 OR 中期経営計画 OR earnings OR acquisition OR merger OR capital)
    tier: 2
    enabled: true
  - name: Google News - MS&AD
    type: google_news_rss
    query: (MS&AD OR 三井住友海上 OR あいおいニッセイ同和) (決算 OR 業績 OR M&A OR 買収 OR 合併 OR 提携 OR IPO OR 増資 OR 配当 OR 経営 OR 規制 OR 行政処分 OR 中期経営計画 OR earnings OR acquisition OR merger OR capital)
