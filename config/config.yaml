sources:
  # ---- Static English RSS feeds ----
  - name: Insurance Journal International
    type: rss
    url: https://www.insurancejournal.com/news/international/feed/
    tier: 3
    enabled: true
  - name: Reinsurance News
    type: rss
    url: https://www.reinsurancene.ws/feed/
    tier: 2
    enabled: true
  - name: Artemis
    type: rss
    url: https://www.artemis.bm/feed/
    tier: 2
    enabled: true

  # ---- Direct Nikkei scrape (disabled; auth blocked by bot detection) ----
  - name: Nikkei 金融・保険
    type: browser_use
    url: https://www.nikkei.com/business/finance/insurance/
    tier: 2
    enabled: false

  # NOTE (Phase 6):
  # Google News RSS queries are no longer listed here. They're auto-generated at
  # runtime as one query per (entity in watchlists.yaml) × (bucket in
  # query_buckets.yaml) — currently 54 entities × 8 buckets = 432 queries per
  # fetch cycle. To expand coverage, add entities to watchlists.yaml or buckets
  # to query_buckets.yaml. No code changes needed.

storage:
  db_path: seen.db

logging:
  log_path: logs/agent.log
  level: INFO

watchlists_path: config/watchlists.yaml
relevance_path: config/relevance.yaml
query_buckets_path: config/query_buckets.yaml
topic_queries_path: config/topic_queries.yaml

collection:
  recency_hours: 24       # passed into Google's `when:Nh` operator + post-fetch filter
  fetch_concurrency: 10   # parallel HTTP requests per fetch cycle

scheduler:
  fetch_interval_minutes: 60
  p1_batch_interval_hours: 3
  digest_cron_hour: 7
  digest_cron_minute: 0
  timezone: Asia/Tokyo
