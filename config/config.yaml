  # ---- Direct Nikkei scrape (disabled; auth blocked by bot detection) ----
  - name: Nikkei 金融・保険
    type: browser_use
    url: https://www.nikkei.com/business/finance/insurance/
    tier: 2
    enabled: false   # Re-enable only after switching to interactive-login + storage_state

storage:
  db_path: seen.db

logging:
  log_path: logs/agent.log
  level: INFO

watchlists_path: config/watchlists.yaml
relevance_path: config/relevance.yaml

scheduler:
  fetch_interval_minutes: 60
  p1_batch_interval_hours: 3
  digest_cron_hour: 7
  digest_cron_minute: 0
  timezone: Asia/Tokyo
