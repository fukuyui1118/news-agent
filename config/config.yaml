  - name: Google News - 保険業界全般
    type: google_news_rss
    query: (保険業界 OR 再保険 OR 損保 OR 生保) (M&A OR 買収 OR 合併 OR 業績 OR 規制 OR 行政処分 OR 不祥事 OR 中期経営計画 OR IPO OR 増資)
