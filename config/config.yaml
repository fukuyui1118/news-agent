storage:
  db_path: seen.db

logging:
  log_path: logs/agent.log
  level: INFO

watchlists_path: config/watchlists.yaml
relevance_path: config/relevance.yaml
feeds_path: config/feeds.yaml
concept_uris_path: config/concept_uris.yaml

collection:
  recency_hours: 24       # post-fetch defensive filter
  fetch_concurrency: 10   # parallel fetches per cycle

scheduler:
  fetch_interval_minutes: 60
  p1_batch_interval_hours: 3
  digest_cron_hour: 7
  digest_cron_minute: 0
  timezone: Asia/Tokyo
